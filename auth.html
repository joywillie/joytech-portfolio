<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoyTech | Secure Gateway</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Poppins, sans-serif;
      background: #0b1329;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      width: 420px;
      background: rgba(17, 28, 58, 0.85);
      padding: 30px;
      border-radius: 15px;
      border: 1px solid #1d4ed8;
    }

    h2 {
      text-align: center;
      color: #fbbf24;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #2563eb;
    }

    .switch {
      text-align: center;
      margin-top: 15px;
      cursor: pointer;
      color: #fbbf24;
    }

    .hidden { display: none; }

    .msg {
      text-align: center;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .error { color: #f87171; }
    .success { color: #34d399; }
  </style>
</head>

<body>

<div class="card">

  <h2>JoyTech Secure Gateway</h2>

  <div id="msg" class="msg"></div>

  <!-- SIGNUP -->
  <div id="signupBox">
    <input id="su_username" placeholder="Username">
    <input id="su_email" placeholder="Email">
    <input id="su_password" type="password" placeholder="Password">
    <button onclick="signup()">Create Account</button>
    <div class="switch" onclick="showLogin()">Already have account? Login</div>
  </div>

  <!-- LOGIN -->
  <div id="loginBox" class="hidden">
    <input id="li_user" placeholder="Username or Email">
    <input id="li_pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="switch" onclick="showSignup()">Create new account</div>
  </div>

</div>

<script>
const msg = document.getElementById("msg");

function showLogin() {
  document.getElementById("signupBox").classList.add("hidden");
  document.getElementById("loginBox").classList.remove("hidden");
  msg.innerText = "";
}

function showSignup() {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("signupBox").classList.remove("hidden");
  msg.innerText = "";
}

// =====================
// SIGNUP
// =====================
async function signup() {
  msg.innerText = "";

  const res = await fetch("/api/auth/signup", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username: document.getElementById("su_username").value,
      email: document.getElementById("su_email").value,
      password: document.getElementById("su_password").value
    })
  });

  const data = await res.json();

  if (res.ok) {
    msg.className = "msg success";
    msg.innerText = "Account created successfully!";
    showLogin();
  } else {
    msg.className = "msg error";
    msg.innerText = data.error || "Signup failed";
  }
}

// =====================
// LOGIN
// =====================
async function login() {
  msg.innerText = "";

  const res = await fetch("/api/auth/signin", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      userKey: document.getElementById("li_user").value,
      password: document.getElementById("li_pass").value
    })
  });

  const data = await res.json();

  if (res.ok) {

    // ✅ CRITICAL FIX (PREVENTS YOUR INDEX PAGE LOOP)
    localStorage.setItem("joytech_token", "logged-in");

    msg.className = "msg success";
    msg.innerText = "Login successful! Redirecting...";

    setTimeout(() => {
      window.location.href = "/";
    }, 1200);

  } else {
    msg.className = "msg error";
    msg.innerText = data.error || "Login failed";
  }
}
</script>

</body>
</html>
