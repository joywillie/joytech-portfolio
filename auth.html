<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoyTech | Secure Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0b1329;
      --panel-bg: rgba(17, 28, 58, 0.95);
      --accent-blue: #1d4ed8;
      --accent-glow: #3b82f6;
      --text-gold: #fbbf24;
      --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      background: radial-gradient(circle at center, #1e293b 0%, var(--bg-deep) 100%);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .portal-card {
      width: 100%;
      max-width: 440px;
      background: var(--panel-bg);
      border: 1px solid rgba(29, 78, 216, 0.25);
      border-radius: 20px;
      padding: 45px 35px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
    }

    .portal-header { text-align: center; margin-bottom: 35px; }
    .portal-header .logo { font-size: 32px; font-weight: 700; color: var(--text-gold); margin-bottom: 6px; }
    .portal-header p { color: var(--text-muted); font-size: 14px; font-weight: 300; }

    .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; position: relative; }
    .form-group label { font-size: 13px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; }
    
    .form-group input {
      background: rgba(11, 19, 41, 0.6);
      border: 1.5px solid rgba(29, 78, 216, 0.4);
      padding: 14px 16px;
      border-radius: 10px;
      color: #ffffff;
      font-size: 15px;
      outline: none;
      width: 100%;
    }
    .form-group input:focus { border-color: var(--accent-glow); box-shadow: 0 0 12px rgba(59, 130, 246, 0.3); }

    .password-toggle {
      position: absolute; right: 16px; bottom: 14px;
      font-size: 12px; color: var(--text-muted); cursor: pointer; font-weight: 600;
      user-select: none;
    }
    .password-toggle:hover { color: var(--text-gold); }

    .forgot-link { font-size: 12px; color: var(--text-gold); text-decoration: underline; cursor: pointer; display: block; text-align: right; margin-top: -16px; margin-bottom: 20px; }

    .btn-portal {
      background: linear-gradient(135deg, var(--accent-blue) 0%, #1e40af 100%);
      color: #ffffff; border: none; padding: 14px; border-radius: 10px;
      font-weight: 600; font-size: 16px; cursor: pointer; width: 100%; transition: all 0.3s;
    }
    .btn-portal:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }

    .portal-switch { text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-muted); }
    .portal-switch span { color: var(--text-gold); font-weight: 500; cursor: pointer; margin-left: 5px; }
    .portal-switch span:hover { text-decoration: underline; }

    .hidden-view { display: none !important; }

    .status-banner { padding: 14px; border-radius: 10px; font-size: 14px; font-weight: 500; margin-bottom: 24px; text-align: center; }
    .success { background: rgba(16, 185, 129, 0.12); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
    .error { background: rgba(239, 68, 68, 0.12); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
  </style>
</head>
<body>

  <div class="portal-card">
    <div class="portal-header">
      <div class="logo">JoyTech</div>
      <p id="portalDesc">Sign in to authenticate identity</p>
    </div>

    <div id="notifier" class="status-banner" style="display: none;"></div>

    <div id="loginBox">
      <form id="loginForm">
        <div class="form-group">
          <label for="logUser">Username or Email</label>
          <input type="text" id="logUser" placeholder="Enter username or email" required />
        </div>
        <div class="form-group">
          <label for="logPass">Password</label>
          <input type="password" id="logPass" placeholder="••••••••" required />
          <span class="password-toggle" onclick="togglePassword('logPass', this)">SHOW</span>
        </div>
        <span class="forgot-link" onclick="switchToForgot()">Forgot Password?</span>
        <button type="submit" class="btn-portal">Secure Unlock</button>
      </form>
      <div class="portal-switch">First time visiting? <span onclick="switchToSignup()">Create Account</span></div>
    </div>

    <div id="signupBox" class="hidden-view">
      <form id="signupForm">
        <div class="form-group">
          <label for="regUser">Username</label>
          <input type="text" id="regUser" placeholder="Choose username" required />
        </div>
        <div class="form-group">
          <label for="regEmail">Email Address</label>
          <input type="email" id="regEmail" placeholder="yourname@example.com" required />
        </div>
        <div class="form-group">
          <label for="regPass">Password</label>
          <input type="password" id="regPass" placeholder="••••••••" required />
          <span class="password-toggle" onclick="togglePassword('regPass', this)">SHOW</span>
        </div>
        <button type="submit" class="btn-portal">Register Account</button>
      </form>
      <div class="portal-switch">Already registered? <span onclick="switchToLogin()">Sign In</span></div>
    </div>

    <div id="forgotBox" class="hidden-view">
      <form id="forgotForm">
        <div class="form-group">
          <label for="forEmail">Email Address</label>
          <input type="email" id="forEmail" placeholder="yourname@example.com" required />
        </div>
        <button type="submit" class="btn-portal">Send Recovery Link</button>
      </form>
      <div class="portal-switch">Remembered password? <span onclick="switchToLogin()">Sign In</span></div>
    </div>
  </div>

  <script>
    const notifier = document.getElementById('notifier');
    const signupBox = document.getElementById('signupBox');
    const loginBox = document.getElementById('loginBox');
    const forgotBox = document.getElementById('forgotBox');
    const portalDesc = document.getElementById('portalDesc');

    function switchToLogin() {
      signupBox.classList.add('hidden-view');
      forgotBox.classList.add('hidden-view');
      loginBox.classList.remove('hidden-view');
      portalDesc.textContent = "Sign in to authenticate identity";
      notifier.style.display = 'none';
    }

    function switchToSignup() {
      loginBox.classList.add('hidden-view');
      forgotBox.classList.add('hidden-view');
      signupBox.classList.remove('hidden-view');
      portalDesc.textContent = "Create your account to unlock access";
      notifier.style.display = 'none';
    }

    function switchToForgot() {
      loginBox.classList.add('hidden-view');
      signupBox.classList.add('hidden-view');
      forgotBox.classList.remove('hidden-view');
      portalDesc.textContent = "Enter email to reset access key";
      notifier.style.display = 'none';
    }

    function togglePassword(id, el) {
      const input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
        el.textContent = "HIDE";
      } else {
        input.type = "password";
        el.textContent = "SHOW";
      }
    }

    // SIGNUP FORM SUBMIT
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      notifier.style.display = 'none';
      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('regUser').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPass').value
          })
        });
        const result = await response.json();
        if (response.ok) {
          notifier.textContent = "✓ Account setup complete! Switching to Sign In...";
          notifier.className = "status-banner success";
          notifier.style.display = "block";
          setTimeout(() => { switchToLogin(); }, 1500);
        } else { throw new Error(result.error); }
      } catch (err) {
        notifier.textContent = `✗ ${err.message}`;
        notifier.className = "status-banner error";
        notifier.style.display = "block";
      }
    });

   document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  notifier.style.display = 'none';

  try {
    const response = await fetch('/api/auth/signin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userKey: document.getElementById('logUser').value,
        password: document.getElementById('logPass').value
      })
    });

    const result = await response.json();

    if (!response.ok) {
      throw new Error(result.error || "Login failed");
    }

    // SAVE TOKEN
    localStorage.setItem("token", result.token);

    localStorage.setItem(
      "user",
      JSON.stringify({
        name: result.user?.username || "User"
      })
    );

    notifier.textContent = "✓ Access granted! Opening JoyTech Portfolio...";
    notifier.className = "status-banner success";
    notifier.style.display = "block";

    setTimeout(() => {
      window.location.href = "index.html";
    }, 1000);

  } catch (err) {
    notifier.textContent = `✗ ${err.message}`;
    notifier.className = "status-banner error";
    notifier.style.display = "block";
  }
});

      if (response.ok) {


  // SAVE LOGIN SESSION

  localStorage.setItem(
    "token",
    result.token
  );


  localStorage.setItem(
    "user",
    JSON.stringify({
      name: result.user?.username || result.user?.name || "Joyce"
    })
  );


  notifier.textContent =
  "✓ Access granted! Opening JoyTech Portfolio...";


  notifier.className =
  "status-banner success";


  notifier.style.display =
  "block";



  setTimeout(()=>{

      window.location.href="index.html";

  },1000);


}
        } else { throw new Error(result.error); }
      } catch (err) {
        notifier.textContent = `✗ ${err.message}`;
        notifier.className = "status-banner error";
        notifier.style.display = "block";
      }
    });

    // FORGOT PASSWORD FORM SUBMIT
    document.getElementById('forgotForm').addEventListener('submit', (e) => {
      e.preventDefault();
      notifier.textContent = "✓ Recovery email sent successfully!";
      notifier.className = "status-banner success";
      notifier.style.display = "block";
    });
  </script>
</body>
</html>
