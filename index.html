<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoyTech Portfolio</title>

  <!-- AUTH GUARD -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const token = localStorage.getItem("joytech_token");

      if (!token) {
        window.location.replace("/auth");
      }
    });
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">JoyTech</div>

  <button class="menu-toggle" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>

  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
    <a href="#" id="logoutBtn">Logout</a>
  </nav>
</header>

<section class="hero" id="home">
  <div class="hero-text">
    <h3>Hello, I'm</h3>
    <h1>Joyce William</h1>
    <h2>ICT Technician & Web Developer</h2>
    <p>Passionate about web development and UI/UX design.</p>
  </div>

  <div class="hero-image">
    <img src="image1.jpg" alt="Profile">
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>

  <!-- ✅ SUCCESS POPUP FIXED (THIS WAS MISSING BEFORE) -->
  <div id="successPopup" style="display:none; background:#16a34a; padding:10px; color:white; margin-bottom:10px;">
    ✓ Message sent successfully! I will get back to you shortly.
  </div>

  <form id="contact-form">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>

    <select name="service" required>
      <option value="">Select Service</option>
      <option>Web Design</option>
      <option>Mobile App</option>
    </select>

    <textarea name="message" placeholder="Message" required></textarea>

    <button type="submit">Send</button>
  </form>
</section>

<footer>
  <p>© 2026 JoyTech Portfolio</p>
</footer>

<script src="script.js"></script>

</body>
</html>
