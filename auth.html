<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoyTech | Secure Gateway</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep: #0b1329;
      --panel-bg: rgba(17, 28, 58, 0.75);
      --accent-blue: #1d4ed8;
      --accent-glow: #3b82f6;
      --text-gold: #fbbf24;
      --text-muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: radial-gradient(circle at center, #1e293b 0%, var(--bg-deep) 100%);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .portal-card {
      width: 100%;
      max-width: 440px;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 45px 35px;
      border: 1px solid rgba(29, 78, 216, 0.25);
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-gold);
      text-align: center;
      margin-bottom: 10px;
    }

    .portal-header p {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      font-size: 12px;
      color: var(--text-muted);
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(59, 130, 246, 0.4);
      background: #0b1329;
      color: white;
      outline: none;
    }

    input:focus {
      border-color: var(--accent-glow);
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--accent-blue);
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 10px;
    }

    button:hover {
      background: #2563eb;
    }

    .switch {
      text-align: center;
      margin-top: 15px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .switch span {
      color: var(--text-gold);
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .status {
      text-align: center;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .success { color: #34d399; }
    .error { color: #f87171; }
  </style>
</head>

<body>

<div class="portal-card">

  <div class="logo">JoyTech</div>
  <p class="portal-header" id="desc">Create your account</p>

  <div id="status" class="status"></div>

  <!-- SIGN UP -->
  <div id="signupBox">
    <div class="form-group">
      <label>Username</label>
      <input id="su_user" type="text">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input id="su_email" type="email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input id="su_pass" type="password">
    </div>

    <button onclick="signup()">Create Account</button>

    <div class="switch">
      Already have account? <span onclick="toggle()">Login</span>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="loginBox" class="hidden">

    <div class="form-group">
      <label>Username or Email</label>
      <input id="li_user" type="text">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input id="li_pass" type="password">
    </div>

    <button onclick="login()">Login</button>

    <div class="switch">
      New user? <span onclick="toggle()">Sign up</span>
    </div>
  </div>

</div>

<script>
const signupBox = document.getElementById("signupBox");
const loginBox = document.getElementById("loginBox");
const status = document.getElementById("status");
const desc = document.getElementById("desc");

function toggle() {
  signupBox.classList.toggle("hidden");
  loginBox.classList.toggle("hidden");

  desc.textContent = signupBox.classList.contains("hidden")
    ? "Login to continue"
    : "Create your account";
}

function showMessage(msg, type) {
  status.textContent = msg;
  status.className = "status " + type;
}

// ================= SIGNUP =================
async function signup() {
  try {
    const res = await fetch("/api/auth/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("su_user").value,
        email: document.getElementById("su_email").value,
        password: document.getElementById("su_pass").value
      })
    });

    const data = await res.json();

    if (res.ok) {
      showMessage("Account created successfully", "success");
      toggle();
    } else {
      throw new Error(data.error);
    }
  } catch (err) {
    showMessage(err.message, "error");
  }
}

// ================= LOGIN =================
async function login() {
  try {
    const res = await fetch("/api/auth/signin", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        userKey: document.getElementById("li_user").value,
        password: document.getElementById("li_pass").value
      })
    });

    const result = await res.json();

    if (res.ok) {

      // ✅ FIXED: SAVE LOGIN SESSION TOKEN
      localStorage.setItem("joytech_token", result.user?.id || "logged-in");

      showMessage("Login successful. Redirecting...", "success");

     setTimeout(() => {
  window.location.replace("/index.html");
}, 1200);

    } else {
      throw new Error(result.error);
    }

  } catch (err) {
    showMessage(err.message, "error");
  }
}
</script>

</body>
</html>
