<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoyTech | Secure Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --input-bg: #0f172a;
      --border: #334155;
      --error: #f87171;
      --success: #4ade80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .auth-container { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 40px 30px; width: 100%; max-width: 420px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); text-align: center; }
    .brand-title { font-size: 2rem; font-weight: 600; color: #f59e0b; margin-bottom: 5px; }
    .brand-subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; }
    .status-banner { padding: 12px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 20px; display: none; text-align: center; font-weight: 500; }
    .status-banner.error { background-color: rgba(248, 113, 113, 0.15); border: 1px solid var(--error); color: var(--error); }
    .status-banner.success { background-color: rgba(74, 222, 128, 0.15); border: 1px solid var(--success); color: var(--success); }
    .form-group { text-align: left; margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
    .form-group input { width: 100%; background-color: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 8px; font-size: 0.95rem; outline: none; }
    .pass-wrapper { position: relative; }
    .toggle-pass { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); font-size: 0.75rem; cursor: pointer; font-weight: 600; }
    .btn-action { width: 100%; background-color: var(--accent); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: 500; cursor: pointer; margin-top: 10px; }
    .btn-action:hover { background-color: var(--accent-hover); }
    .btn-action:disabled { background-color: var(--border); color: var(--text-muted); cursor: not-allowed; }
    .switch-view-text { margin-top: 25px; font-size: 0.85rem; color: var(--text-muted); }
    .switch-view-text span { color: #f59e0b; cursor: pointer; font-weight: 500; margin-left: 5px; }
    .switch-view-text span:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="brand-title">JoyTech</div>
    <div class="brand-subtitle" id="gateway-desc">Sign in to authenticate identity</div>

    <div id="statusAlert" class="status-banner"></div>

    <form id="auth-form">
      <div id="form-fields-container"></div>
      <button type="submit" id="submitBtn" class="btn-action">Secure Unlock</button>
    </form>

    <div class="switch-view-text" id="toggleModeContainer">
      First time visiting? <span id="switchModeBtn">Create Account</span>
    </div>
  </div>

  <script>
    let isLoginMode = true;

    const gatewayDesc = document.getElementById('gateway-desc');
    const fieldsContainer = document.getElementById('form-fields-container');
    const submitBtn = document.getElementById('submitBtn');
    const toggleModeContainer = document.getElementById('toggleModeContainer');
    const statusAlert = document.getElementById('statusAlert');
    const authForm = document.getElementById('auth-form');

    function buildFormLayout() {
      statusAlert.style.display = 'none';
      if (isLoginMode) {
        gatewayDesc.textContent = "Sign in to authenticate identity";
        submitBtn.textContent = "Secure Unlock";
        toggleModeContainer.innerHTML = `First time visiting? <span id="switchModeBtn">Create Account</span>`;
        
        fieldsContainer.innerHTML = `
          <div class="form-group">
            <label for="userKey">Username or Email</label>
            <input type="text" id="userKey" placeholder="Enter username or email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="pass-wrapper">
              <input type="password" id="password" placeholder="Enter security password" required />
              <button type="button" class="toggle-pass" onclick="togglePasswordVisibility('password')">Show</button>
            </div>
          </div>
        `;
      } else {
        gatewayDesc.textContent = "Create your account to unlock access";
        submitBtn.textContent = "Register Account";
        toggleModeContainer.innerHTML = `Already registered? <span id="switchModeBtn">Sign In Portal</span>`;
        
        fieldsContainer.innerHTML = `
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Choose a username" required />
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="name@example.com" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="pass-wrapper">
              <input type="password" id="password" placeholder="Create strong password" required />
              <button type="button" class="toggle-pass" onclick="togglePasswordVisibility('password')">Show</button>
            </div>
          </div>
        `;
      }
      
      document.getElementById('switchModeBtn').addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        buildFormLayout();
      });
    }

    function togglePasswordVisibility(id) {
      const field = document.getElementById(id);
      const btn = field.nextElementSibling;
      if (field.type === 'password') {
        field.type = 'text';
        btn.textContent = 'Hide';
      } else {
        field.type = 'password';
        btn.textContent = 'Show';
      }
    }

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      statusAlert.style.display = 'none';

      const targetUrl = isLoginMode ? '/api/auth/signin' : '/api/auth/signup';
      let payload = {};

      if (isLoginMode) {
        payload = {
          userKey: document.getElementById('userKey').value,
          password: document.getElementById('password').value
        };
        submitBtn.textContent = "Verifying...";
      } else {
        payload = {
          username: document.getElementById('username').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        };
        submitBtn.textContent = "Creating Account...";
      }

      try {
        const response = await fetch(targetUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok && data.success) {
          statusAlert.className = "status-banner success";
          statusAlert.textContent = "✓ Authentication verified. Opening system...";
          statusAlert.style.display = 'block';
          
          setTimeout(() => {
            window.location.replace('/dashboard');
          }, 500);
        } else {
          throw new Error(data.error || 'Authentication rejected.');
        }
      } catch (err) {
        statusAlert.className = "status-banner error";
        statusAlert.textContent = `X ${err.message}`;
        statusAlert.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = isLoginMode ? "Secure Unlock" : "Register Account";
      }
    });

    buildFormLayout();
  </script>
</body>
</html>
