<style>
  body {
    margin: 0;

    background: #0f172a;

    align-items: center;

    height: 100vh;
  }

    color: #38bdf8;

  }

    border-radius: 8px;

    color: white;

  }

  button {

    transition: 0.3s;

  button:hover {
    background: #0ea5e9;
  }

  .toggle {
    text-align: center;
    margin-top: 15px;
    color: #94a3b8;
    cursor: pointer;
  }

    text-align: center;
    margin-top: 10px;
