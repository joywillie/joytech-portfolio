<!DOCTYPE html>
<html>
<head>
<title>Auth</title>
<style>
body{font-family:Arial;background:#0b1329;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#111c3a;padding:20px;width:350px}
input,button{width:100%;padding:10px;margin:5px 0}
.hidden{display:none}
.msg{margin:5px 0}
</style>
</head>
<body>

<div class="box">

<div id="msg"></div>

<div id="loginBox">
<input id="loginUser" placeholder="Username/email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p onclick="showSignup()">Signup</p>
</div>

<div id="signupBox" class="hidden">
<input id="signupUser" placeholder="Username">
<input id="signupEmail" placeholder="Email">
<input id="signupPass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<p onclick="showLogin()">Login</p>
</div>

</div>

<script>

const msg = document.getElementById("msg");

function showSignup(){
  loginBox.classList.add("hidden");
  signupBox.classList.remove("hidden");
}

function showLogin(){
  signupBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

// SIGNUP
async function signup(){
  const res = await fetch("/api/auth/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:signupUser.value,
      email:signupEmail.value,
      password:signupPass.value
    })
  });

  const data = await res.json();

  if(!res.ok){
    msg.innerText = data.error;
    return;
  }

  msg.innerText = "Signup success";

  signupUser.value="";
  signupEmail.value="";
  signupPass.value="";

  showLogin();
}

// LOGIN
async function login(){
  const res = await fetch("/api/auth/signin",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      userKey:loginUser.value,
      password:loginPass.value
    })
  });

  const data = await res.json();

  if(!res.ok){
    msg.innerText = data.error;
    return;
  }

  if(!data.token){
    msg.innerText = "No token received";
    return;
  }

  localStorage.setItem("token", data.token);

  window.location.href="/dashboard";
}

// AUTO CHECK
if(localStorage.getItem("token")){
  window.location.href="/dashboard";
}

</script>

</body>
</html>
