<section class="contact" id="contact">
    <div class="section-title">
      <h2>Contact Me</h2>
    </div>

    <div class="contact-wrapper">
      
      <div class="contact-info">
        <div class="info-item">
          <h4>Call Me</h4>
          <a href="tel:0745806435">0745806435</a>
        </div>
        <div class="info-item">
          <h4>WhatsApp Me</h4>
          <a href="https://wa.me/254745806435" target="_blank">Chat on WhatsApp</a>
        </div>
        <div class="info-item">
          <h4>Email Me</h4>
          <a href="mailto:jw42205769@gmail.com">jw42205769@gmail.com</a>
        </div>
      </div>

      <div class="form-container">
        <div data-fs-success class="form-alert success-message" style="display: none;">
          ✓ Message sent successfully! I will get back to you shortly.
        </div>
        <div data-fs-error class="form-alert error-message" style="display: none;">
          ✗ Failed to send. Please check your connectivity or inputs and try again.
        </div>

        <form id="contact-form" class="custom-form">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Your Name</label>
              <input type="text" id="name" name="name" data-fs-field placeholder="John Doe" required />
              <span class="field-error" data-fs-error="name" style="color: #f87171; font-size: 0.8rem; display: block; margin-top: 4px;"></span>
            </div>
            
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" data-fs-field placeholder="client@example.com" required />
              <span class="field-error" data-fs-error="email" style="color: #f87171; font-size: 0.8rem; display: block; margin-top: 4px;"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="service">Requested Domain / Service</label>
            <select id="service" name="service" data-fs-field required>
              <option value="" disabled selected>Select an operational domain...</option>
              <option value="mobile_app">Mobile App</option>
              <option value="responsive_websites">Responsive Websites</option>
              <option value="posters">Posters</option>
              <option value="flyers">Flyers</option>
            </select>
            <span class="field-error" data-fs-error="service" style="color: #f87171; font-size: 0.8rem; display: block; margin-top: 4px;"></span>
          </div>

          <div class="form-group">
            <label for="message">Detailed Scope & Requirements</label>
            <textarea id="message" name="message" data-fs-field placeholder="Outline specific technical requirements, design themes, or project timelines..." required></textarea>
            <span class="field-error" data-fs-error="message" style="color: #f87171; font-size: 0.8rem; display: block; margin-top: 4px;"></span>
          </div>

          <button type="submit" data-fs-submit-btn class="btn-submit">Send Message</button>
        </form>
      </div>

    </div>
  </section>
