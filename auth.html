<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoyTech - Portal Authentication</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #0b1329; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">

  <div class="auth-container">
    <div id="authTabs" class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('signin')">Sign In</div>
      <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <div id="authSuccess" class="form-alert success-message" style="display: none;"></div>
    <div id="authError" class="form-alert error-message" style="display: none;"></div>

    <div id="signinPanel">
      <form id="signinForm" class="custom-form">
        <div class="form-group">
          <label for="signinUser">Username or Email</label>
          <input type="text" id="signinUser" placeholder="joytech_dev" required />
        </div>
        <div class="form-group password-wrapper">
          <label for="signinPassword">Password</label>
          <input type="password" id="signinPassword" placeholder="••••••••" required />
          <span class="toggle-password" onclick="togglePasswordVisibility('signinPassword')">👁️ Show</span>
        </div>
        <p style="text-align: right; margin-top: -5px;">
          <span class="auth-toggle-link" onclick="switchTab('forgot')">Forgot Password?</span>
        </p>
        <button type="submit" id="signinBtn" class="btn-submit" style="width: 100%; margin-top: 10px;">Sign In</button>
      </form>
    </div>

    <div id="signupPanel" class="hidden-panel">
      <form id="signupForm" class="custom-form">
        <div class="form-group">
          <label for="signupUsername">Preferred Username</label>
          <input type="text" id="signupUsername" placeholder="joytech_member" required />
        </div>
        <div class="form-group">
          <label for="signupEmail">Email Address</label>
          <input type="email" id="signupEmail" placeholder="client@example.com" required />
        </div>
        <div class="form-group password-wrapper">
          <label for="signupPassword">Secure Password</label>
          <input type="password" id="signupPassword" placeholder="••••••••" required />
          <span class="toggle-password" onclick="togglePasswordVisibility('signupPassword')">👁️ Show</span>
        </div>
        <button type="submit" id="signupBtn" class="btn-submit" style="width: 100%; margin-top: 10px;">Create Account</button>
      </form>
    </div>

    <div id="forgotPanel" class="hidden-panel">
      <h3 style="margin-bottom: 10px; color: #ffffff; font-size: 20px;">Reset Password</h3>
      <p style="font-size: 13px; color: #94a3b8; margin-bottom: 20px;">
        Provide your registered email address below to overwrite your account records inside the database safely.
      </p>
      <form id="forgotForm" class="custom-form">
        <div class="form-group">
          <label for="forgotEmail">Email Address</label>
          <input type="email" id="forgotEmail" placeholder="your-email@example.com" required />
        </div>
        <div class="form-group password-wrapper">
          <label for="forgotNewPassword">New Password</label>
          <input type="password" id="forgotNewPassword" placeholder="••••••••" required />
          <span class="toggle-password" onclick="togglePasswordVisibility('forgotNewPassword')">👁️ Show</span>
        </div>
        <button type="submit" id="forgotBtn" class="btn-submit" style="width: 100%; margin-top: 10px;">Update Password</button>
        <p style="text-align: center; margin-top: 15px;">
          <span class="auth-toggle-link" onclick="switchTab('signin')">Back to Sign In</span>
        </p>
      </form>
    </div>
  </div>

  <script>
    const successAlert = document.getElementById('authSuccess');
    const errorAlert = document.getElementById('authError');

    // Tab Switching Machine Logic
    function switchTab(mode) {
      successAlert.style.display = 'none';
      errorAlert.style.display = 'none';
      
      document.getElementById('signinPanel').classList.add('hidden-panel');
      document.getElementById('signupPanel').classList.add('hidden-panel');
      document.getElementById('forgotPanel').classList.add('hidden-panel');
      document.getElementById('authTabs').style.display = 'flex';
      
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));

      if (mode === 'signin') {
        document.getElementById('signinPanel').classList.remove('hidden-panel');
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
      } else if (mode === 'signup') {
        document.getElementById('signupPanel').classList.remove('hidden-panel');
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
      } else if (mode === 'forgot') {
        document.getElementById('forgotPanel').classList.remove('hidden-panel');
        document.getElementById('authTabs').style.display = 'none';
      }
    }

    // Dynamic Masking Utility Toggle (Show/Hide Text while typing)
    function togglePasswordVisibility(fieldId) {
      const passwordField = document.getElementById(fieldId);
      const toggleBtn = passwordField.nextElementSibling;
      if (passwordField.type === "password") {
        passwordField.type = "text";
        toggleBtn.textContent = "🙈 Hide";
      } else {
        passwordField.type = "password";
        toggleBtn.textContent = "👁️ Show";
      }
    }

    const showAlert = (isSuccess, text) => {
      if (isSuccess) {
        successAlert.style.display = 'block';
        successAlert.textContent = text;
        errorAlert.style.display = 'none';
      } else {
        errorAlert.style.display = 'block';
        errorAlert.textContent = text;
        successAlert.style.display = 'none';
      }
    };

    // 1. SIGN UP SUBMISSION ENGINE (Forwards to login page)
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('signupUsername').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const btn = document.getElementById('signupBtn');

      btn.disabled = true;
      btn.textContent = 'Processing...';

      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const result = await response.json();
        
        if (response.ok) {
          document.getElementById('signupForm').reset();
          showAlert(true, "✓ Registration successful! Sending you to Sign In screen...");
          
          // Smoothly shifts focus to the Sign In layout after 2 seconds
          setTimeout(() => {
            switchTab('signin');
            showAlert(true, "Profile generated successfully! Use your new credentials to log in.");
          }, 2000);
          
        } else { throw new Error(result.error || 'Registration failed.'); }
      } catch (err) { 
        showAlert(false, `✗ Error: ${err.message}`); 
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });

    // 2. SIGN IN SUBMISSION ENGINE (Forwards to main portfolio layout)
    document.getElementById('signinForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const userKey = document.getElementById('signinUser').value;
      const password = document.getElementById('signinPassword').value;
      const btn = document.getElementById('signinBtn');

      btn.disabled = true;
      btn.textContent = 'Verifying...';

      try {
        const response = await fetch('/api/auth/signin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userKey, password })
        });
        const result = await response.json();
        
        if (response.ok) {
          showAlert(true, `✓ Access granted! Welcome back, ${result.user.username}. Entering website...`);
          
          // Triggers redirection back to your main website layout home index after 1.5 seconds
          setTimeout(() => {
            window.location.href = '/';
          }, 1500);
          
        } else { throw new Error(result.error || 'Invalid credentials.'); }
      } catch (err) { 
        showAlert(false, `✗ Error: ${err.message}`); 
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    // 3. FORGOT PASSWORD SUBMISSION ENGINE
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value;
      const newPassword = document.getElementById('forgotNewPassword').value;
      const btn = document.getElementById('forgotBtn');

      btn.disabled = true;
      btn.textContent = 'Modifying records...';

      try {
        const response = await fetch('/api/auth/forgot', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, newPassword })
        });
        const result = await response.json();
        
        if (response.ok) {
          showAlert(true, "✓ Password overwritten in database! Redirecting to login...");
          document.getElementById('forgotForm').reset();
          setTimeout(() => {
            switchTab('signin');
          }, 2000);
        } else { throw new Error(result.error || 'Unable to update password.'); }
      } catch (err) { 
        showAlert(false, `✗ Error: ${err.message}`); 
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
